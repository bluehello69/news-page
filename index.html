<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Always Live | National Fact Tracker</title>
    <style>
        :root {
            /* High-visibility warm tricolor theme */
            --bg-main: linear-gradient(180deg, 
                #fff1e6 0%, 
                #ffffff 35%, 
                #ffffff 65%, 
                #e8f5e9 100%
            );
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #cbd5e1;
            --accent: #ff9933; /* Saffron headline emphasis */
            --accent-glow: rgba(255, 153, 51, 0.08);
            
            --intensity-high: #ef4444;
            --intensity-med: #f59e0b;
            --intensity-low: #10b981;
            
            --font-scale: 1;
        }

        [data-theme="dark"] {
            --bg-main: #090d16;
            --bg-card: #111827;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-muted: #6b7280;
            --border: #374151;
            --accent: #f9fafb;
            --accent-glow: rgba(249, 250, 251, 0.07);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-main);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
        }

        header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff9933; /* Saffron divider line */
            padding-bottom: 16px;
            margin-bottom: 24px;
            gap: 12px;
        }

        header h1 {
            font-size: calc(1.6rem * var(--font-scale));
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: #0f172a;
        }
        [data-theme="dark"] header h1 {
            color: #f9fafb;
        }

        .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            font-size: calc(0.9rem * var(--font-scale));
            height: 38px;
            padding: 0 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--text-primary);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .action-btn:hover { 
            background: var(--accent-glow);
            border-color: #ff9933;
        }

        .zones-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 24px;
        }

        .zone-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-secondary);
            padding: 12px 4px;
            font-weight: 700;
            font-size: calc(0.85rem * var(--font-scale));
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .zone-btn.active {
            background: #138808; /* Green active selector */
            color: #ffffff;
            border-color: #138808;
        }

        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .state-block {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Abstract structural map shape overlay graphic */
        .state-map-bg {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 300px;
            background: radial-gradient(circle at 70% 30%, rgba(255, 153, 51, 0.05) 0%, rgba(19, 136, 8, 0.05) 60%, transparent 100%);
            mask-image: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
            pointer-events: none;
            user-select: none;
        }

        .state-header {
            border-bottom: 2px dashed var(--border);
            padding-bottom: 10px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px;
        }

        .state-name {
            font-size: calc(1.35rem * var(--font-scale));
            font-weight: 800;
            color: #0f172a;
        }
        [data-theme="dark"] .state-name {
            color: #f9fafb;
        }

        .refresh-status {
            font-size: calc(0.8rem * var(--font-scale));
            color: var(--text-muted);
            font-weight: 600;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        .news-item {
            position: relative;
            padding-left: 16px;
        }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 5px;
            height: 14px;
            border-radius: 3px;
            background: var(--i-color);
        }

        .news-top-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: calc(0.75rem * var(--font-scale));
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .headline {
            font-size: calc(1rem * var(--font-scale));
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .reasoning {
            font-size: calc(0.88rem * var(--font-scale));
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .src-btn {
            font-size: calc(0.8rem * var(--font-scale));
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
        }
        .src-btn:hover { color: #ff9933; text-decoration: underline; }

        .indicators-panel {
            background: rgba(15, 23, 42, 0.02);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: fit-content;
            position: relative;
            z-index: 2;
        }
        [data-theme="dark"] .indicators-panel {
            background: rgba(255,255,255,0.02);
        }

        .panel-sec-title {
            font-size: calc(0.75rem * var(--font-scale));
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: calc(0.85rem * var(--font-scale));
            font-weight: 600;
            padding-bottom: 4px;
            gap: 10px;
        }
        
        .metric-val {
            font-weight: 700;
            text-align: right;
            color: var(--text-primary);
        }

        /* Responsive Mobile Layout Overhaul */
        @media(max-width: 768px) {
            body { padding: 12px 6px; }
            header { flex-direction: column; align-items: flex-start; border-width: 4px; }
            .header-actions { width: 100%; justify-content: space-between; }
            .zones-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .state-block { grid-template-columns: 1fr; padding: 18px; }
            .state-map-bg { width: 100%; height: 50%; top: auto; }
        }
        @media(max-width: 480px) {
            .zones-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        let currentFontScale = 1.0;
        let currentZone = 'all';

        function renderDashboard(zoneFilter = 'all') {
            currentZone = zoneFilter;
            const container = document.getElementById('dashboardContent');
            container.innerHTML = '';

            const filteredData = zoneFilter === 'all' 
                ? masterDatabase 
                : masterDatabase.filter(item => item.zone === zoneFilter);

            filteredData.forEach(data => {
                let updateString = "Just updated";
                if (data.lastUpdatedHoursAgo > 4) {
                    updateString = `* updated ${data.lastUpdatedHoursAgo} hours ago`;
                } else if (data.lastUpdatedHoursAgo > 0) {
                    updateString = `updated ${data.lastUpdatedHoursAgo} hours ago`;
                }

                const block = document.createElement('div');
                block.className = 'state-block';

                const newsHTML = data.news.map(n => {
                    let color = 'var(--intensity-low)';
                    if(n.intensity === 'high') color = 'var(--intensity-high)';
                    if(n.intensity === 'med') color = 'var(--intensity-med)';

                    return `
                        <div class="news-item" style="--i-color: ${color}">
                            <div class="news-top-meta">
                                <span style="color: ${color}">${n.tag}</span>
                                <span style="color: var(--text-muted)">• 60s read</span>
                            </div>
                            <div class="headline">${n.title}</div>
                            <div class="reasoning">${n.reason}</div>
                            <a href="${n.link}" class="src-btn" target="_blank">View Original Source ↗</a>
                        </div>
                    `;
                }).join('');

                block.innerHTML = `
                    <div class="state-map-bg"></div>
                    <div>
                        <div class="state-header">
                            <span class="state-name">${data.state}</span>
                            <span class="refresh-status">${updateString}</span>
                        </div>
                        <div class="news-list">
                            ${newsHTML}
                        </div>
                    </div>
                    <div class="indicators-panel">
                        <div>
                            <div class="panel-sec-title">Regional Sync</div>
                            <div class="metric-row"><span>Time:</span><span class="metric-val">${data.time}</span></div>
                            <div class="metric-row"><span>Weather:</span><span class="metric-val">${data.weather}</span></div>
                        </div>
                        <div>
                            <div class="panel-sec-title">Commodity Index</div>
                            <div class="metric-row"><span>Grocery Basket:</span><span class="metric-val">${data.prices.grocery}</span></div>
                            <div class="metric-row"><span>Fuel (Petrol):</span><span class="metric-val">${data.prices.fuel}</span></div>
                            <div class="metric-row"><span>LPG Cylinder:</span><span class="metric-val">${data.prices.resource}</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(block);
            });
        }

        function switchZone(zone, buttonElement) {
            document.querySelectorAll('.zone-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            renderDashboard(zone);
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('modeToggle');
            const isDark = body.getAttribute('data-theme') === 'dark';
            
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.innerHTML = isDark ? '🌙' : '☀️';
        }

        function adjustFont(amount) {
            currentFontScale = Math.max(0.8, Math.min(1.8, currentFontScale + amount));
            document.documentElement.style.setProperty('--font-scale', currentFontScale);
            renderDashboard(currentZone);
        }

        function refreshPage() {
            window.location.reload();
        }

        renderDashboard('all');
    </script>
