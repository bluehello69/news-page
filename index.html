<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Always Live | National Fact Tracker</title>
    <style>
        :root {
            --bg-main: linear-gradient(180deg, #ffe0b2 0%, #ffffff 40%, #ffffff 60%, #c8e6c9 100%);
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: #94a3b8;
            --accent: #ff9933;
            --accent-glow: rgba(255, 153, 51, 0.15);
            --map-fill: #e2e8f0;
            --map-stroke: #64748b;
            --intensity-high: #ef4444;
            --intensity-med: #f59e0b;
            --intensity-low: #10b981;
            --font-scale: 1;
        }

        [data-theme="dark"] {
            --bg-main: linear-gradient(180deg, #2d1500 0%, #0f172a 35%, #0f172a 65%, #002204 100%);
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #475569;
            --accent: #ffb74d;
            --accent-glow: rgba(255, 183, 77, 0.15);
            --map-fill: #334155;
            --map-stroke: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-main);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff9933;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: calc(1.6rem * var(--font-scale));
            font-weight: 800;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            font-size: calc(0.9rem * var(--font-scale));
            height: 38px;
            padding: 0 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-primary);
        }

        .action-btn:hover {
            background: var(--accent-glow);
            border-color: #ff9933;
        }

        .zones-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 24px;
        }

        .zone-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-secondary);
            padding: 12px 4px;
            font-weight: 700;
            font-size: calc(0.85rem * var(--font-scale));
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            text-align: center;
        }

        .zone-btn.active {
            background: #138808;
            color: #ffffff;
            border-color: #138808;
        }

        /* Map Container Custom Styling */
        .map-section {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .map-container {
            width: 100%;
            max-width: 450px;
            height: auto;
        }

        .map-region {
            fill: var(--map-fill);
            stroke: var(--map-stroke);
            stroke-width: 2;
            cursor: pointer;
            transition: fill 0.2s ease, transform 0.2s ease;
        }

        .map-region:hover {
            fill: var(--accent-glow);
            stroke: #ff9933;
        }

        .map-region.active-region {
            fill: #138808;
            stroke: #ffffff;
        }

        .map-label {
            fill: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
            pointer-events: none;
            text-anchor: middle;
        }

        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .state-block {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .state-header {
            border-bottom: 2px dashed var(--border);
            padding-bottom: 10px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .state-name {
            font-size: calc(1.35rem * var(--font-scale));
            font-weight: 800;
        }

        .refresh-status {
            font-size: calc(0.8rem * var(--font-scale));
            color: var(--text-muted);
            font-weight: 600;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .news-item {
            position: relative;
            padding-left: 16px;
        }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 5px;
            height: 14px;
            border-radius: 3px;
            background: var(--i-color);
        }

        .headline {
            font-size: calc(1rem * var(--font-scale));
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .reasoning {
            font-size: calc(0.88rem * var(--font-scale));
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .src-btn {
            font-size: calc(0.8rem * var(--font-scale));
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
        }
        .src-btn:hover { color: #ff9933; text-decoration: underline; }

        .indicators-panel {
            background: rgba(15, 23, 42, 0.04);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: fit-content;
        }

        .panel-sec-title {
            font-size: calc(0.75rem * var(--font-scale));
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: calc(0.85rem * var(--font-scale));
            font-weight: 600;
        }
        
        .metric-val {
            font-weight: 700;
            text-align: right;
        }

        @media(max-width: 768px) {
            body { padding: 12px 6px; }
            header { flex-direction: column; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: space-between; }
            .zones-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .state-block { grid-template-columns: 1fr; padding: 18px; }
        }
    </style>
</head>

                        <div class="news-top-meta">
                            <span style="color: var(--intensity-high)">${n.tag}</span>
                            <span style="color: var(--text-muted)">• 60s read</span>
                        </div>
                        <div class="headline">${n.title}</div>
                        <div class="reasoning">${n.reason}</div>
                        <a href="${n.link}" class="src-btn" target="_blank">View Original Source ↗</a>
                    </div>
                `).join('');

                block.innerHTML = `
                    <div>
                        <div class="state-header">
                            <span class="state-name">${data.state}</span>
                            <span class="refresh-status">${updateString}</span>
                        </div>
                        <div class="news-list">${newsHTML}</div>
                    </div>
                    <div class="indicators-panel">
                        <div>
                            <div class="panel-sec-title">Regional Sync</div>
                            <div class="metric-row"><span>Time:</span><span class="metric-val">${data.time}</span></div>
                            <div class="metric-row"><span>Weather:</span><span class="metric-val">${data.weather}</span></div>
                        </div>
                        <div>
                            <div class="panel-sec-title">Commodity Index</div>
                            <div class="metric-row"><span>Grocery Basket:</span><span class="metric-val">${data.prices.grocery}</span></div>
                            <div class="metric-row"><span>Fuel:</span><span class="metric-val">${data.prices.fuel}</span></div>
                            <div class="metric-row"><span>LPG Asset:</span><span class="metric-val">${data.prices.resource}</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(block);
            });
        }

        function switchZone(zone, buttonElement) {
            document.querySelectorAll('.zone-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.map-region').forEach(reg => reg.classList.remove('active-region'));
            
            if (buttonElement) buttonElement.classList.add('active');
            else {
                const targetBtn = document.getElementById(`btn-${zone}`);
                if (targetBtn) targetBtn.classList.add('active');
            }

            if (zone !== 'all') {
                const activeMapPart = document.getElementById(`map-${zone}`);
                if (activeMapPart) activeMapPart.classList.add('active-region');
            }

            renderDashboard(zone);
        }

        function handleMapClick(zone) {
            switchZone(zone, null);
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('modeToggle');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.innerHTML = isDark ? '🌙' : '☀️';
        }

        function adjustFont(amount) {
            currentFontScale = Math.max(0.8, Math.min(1.6, currentFontScale + amount));
            document.documentElement.style.setProperty('--font-scale', currentFontScale);
            renderDashboard(activeFilter);
        }

        function refreshPage() {
            window.location.reload();
        }

        // Run baseline setup sequence
        document.body.setAttribute('data-theme', 'light');
        renderDashboard('all');
    </script>
</body>
</html>
