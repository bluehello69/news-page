    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

            --bg-main: linear-gradient(180deg, 
                #ff8000 0%, 
                #ffffff 40%, 
                #ffffff 60%, 
                #00cc44 100%
            );
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #1e293b;
            --text-muted: #475569;
            --border: #0f172a;
            --accent-saffron: #ff6600;
            --accent-green: #009933;
            --accent-blue: #000088;
            --map-fill: #f8fafc;
            --map-stroke: #0f172a;
            --intensity-high: #dc2626;
            --font-scale: 1;
        }

        [data-theme="dark"] {
            --bg-main: linear-gradient(180deg, 
                #4a1a00 0%, 
                #020617 35%, 
                #020617 65%, 
                #00330f 100%
            );
            --bg-card: #0f172a;
            --text-primary: #ffffff;
            --text-secondary: #f1f5f9;
            --text-muted: #cbd5e1;
            --border: #64748b;
            --map-fill: #1e293b;
            --map-stroke: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--bg-main);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
        }

        header {
            display: flex;
            flex-direction: column;
            border-bottom: 5px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 28px;
            gap: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        header h1 {
            font-size: calc(2.2rem * var(--font-scale));
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            background: linear-gradient(90deg, var(--accent-saffron) 0%, var(--accent-blue) 50%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .live-sync-bar {
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            font-size: calc(1rem * var(--font-scale));
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .digital-clock {
            font-family: monospace;
            background: var(--accent-blue);
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 900;
            font-size: calc(1.1rem * var(--font-scale));
            box-shadow: 0 0 10px rgba(0,0,136,0.2);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 3px solid var(--border);
            font-size: calc(0.95rem * var(--font-scale));
            height: 44px;
            padding: 0 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        /* Distinct, Impactful Navigation Controls Block */
        .navigation-block {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .home-btn-anchor {
            flex: 1.2;
        }

        .home-btn {
            width: 100%;
            background: var(--text-primary);
            color: var(--bg-card);
            border: 4px solid var(--accent-saffron);
            padding: 16px;
            font-weight: 900;
            font-size: calc(1.1rem * var(--font-scale));
            cursor: pointer;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 12px rgba(255,102,0,0.2);
            transition: all 0.2s ease;
        }

        .home-btn.active {
            border-color: var(--accent-green);
            box-shadow: 0 6px 16px rgba(0,204,68,0.3);
        }

        .directions-subgrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            flex: 3;
        }

        .zone-btn {
            background: var(--bg-card);
            border: 3px solid var(--border);
            color: var(--text-primary);
            padding: 16px 4px;
            font-weight: 800;
            font-size: calc(0.95rem * var(--font-scale));
            cursor: pointer;
            border-radius: 12px;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.2s ease;
        }

        .zone-btn.active {
            background: var(--accent-green);
            color: #ffffff;
            border-color: var(--accent-green);
            box-shadow: 0 6px 14px rgba(0, 153, 51, 0.3);
        }

        .map-section {
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
        }

        .map-container {
            width: 100%;
            max-width: 440px;
            height: auto;
        }

        .map-region {
            fill: var(--map-fill);
            stroke: var(--map-stroke);
            stroke-width: 3;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .map-region:hover {
            fill: rgba(255, 102, 0, 0.15);
            stroke: var(--accent-saffron);
        }

        .map-region.active-region {
            fill: var(--accent-green);
            stroke: #ffffff;
        }

        .map-label {
            fill: var(--text-primary);
            font-size: 14px;
            font-weight: 900;
            pointer-events: none;
            text-anchor: middle;
        }

        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .state-block {
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 28px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .state-header {
            border-bottom: 3px dashed var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .state-name {
            font-size: calc(1.6rem * var(--font-scale));
            font-weight: 900;
        }

        .refresh-status {
            font-size: calc(0.9rem * var(--font-scale));
            color: var(--text-muted);
            font-weight: 700;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-item {
            position: relative;
            padding-left: 20px;
        }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 7px;
            height: 18px;
            border-radius: 4px;
            background: var(--intensity-high);
        }

        .headline {
            font-size: calc(1.15rem * var(--font-scale));
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .reasoning {
            font-size: calc(0.95rem * var(--font-scale));
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .src-btn {
            font-size: calc(0.88rem * var(--font-scale));
            color: var(--accent-blue);
            text-decoration: underline;
            font-weight: 700;

            background: rgba(15, 23, 42, 0.04);
            border: 3px solid var(--border);
            border-radius: 12px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            justify-content: center;
        }

        .panel-sec-title {
            font-size: calc(0.95rem * var(--font-scale));
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            font-weight: 900;
            margin-bottom: 8px;
            border-bottom: 3px solid var(--border);
            padding-bottom: 6px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: calc(1.05rem * var(--font-scale));
            font-weight: 800;
            padding-bottom: 4px;
        }
        
        .metric-val {
            font-weight: 900;
            text-align: right;
        }

        @media(max-width: 768px) {
            body { padding: 16px 8px; }
            .navigation-block { flex-direction: column; gap: 8px; }
            .directions-subgrid { grid-template-columns: repeat(2, 1fr); }
            .state-block { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>

            { state: "Tripura", zone: "east", lastUpdatedHoursAgo: 3, weather: "27°C Overcast", time: "IST", prices: { grocery: "Index 95.2", fuel: "₹99.50/L", resource: "₹880/Cylinder" }, news: [ { tag: "High Impact", title: "Agartala transit rail loop track layout verified", reason: "Simulated load balance tests operate error free." } ] },
            { state: "Uttar Pradesh", zone: "north", lastUpdatedHoursAgo: 1, weather: "34°C Humid", time: "IST", prices: { grocery: "Index 91.2", fuel: "₹94.65/L", resource: "₹850/Cylinder" }, news: [ { tag: "High Impact", title: "Expressway logistics corridor hubs assigned", reason: "Selected land layout optimization enables clean high-speed trade routes." } ] },
            { state: "Uttarakhand", zone: "north", lastUpdatedHoursAgo: 3, weather: "24°C Overcast", time: "IST", prices: { grocery: "Index 96.5", fuel: "₹94.00/L", resource: "₹895/Cylinder" }, news: [ { tag: "High Impact", title: "Garhwal ecological buffer zones designated", reason: "Monitors moving soil trends across fragile high-altitude sectors dynamically." } ] },
            { state: "West Bengal", zone: "east", lastUpdatedHoursAgo: 1, weather: "28°C Rainy", time: "IST", prices: { grocery: "Index 91.5", fuel: "₹104.95/L", resource: "₹890/Cylinder" }, news: [ { tag: "High Impact", title: "Haldia refinery operational line integration done", reason: "Upgrades crude output performance matrices by 12% baseline parameters." } ] }
        ];

        let currentFontScale = 1.0;
        let activeFilter = 'all';

        function initializeSensors() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
            }, 1000);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude.toFixed(2);
                        const lon = position.coords.longitude.toFixed(2);
                        document.getElementById('sync-city').innerText = `Lat: ${lat}, Lon: ${lon}`;
                        const mockTemp = Math.floor(26 + (position.coords.latitude % 8));
                        document.getElementById('sync-weather').innerText = `${mockTemp}°C Modulate Overcast`;
                        document.getElementById('sync-rain').innerText = mockTemp > 31 ? "12% Trace Risk" : "70% Active Showers Tracked";
                    },
                    () => {
                        document.getElementById('sync-city').innerText = "Kolkata, WB";
                        document.getElementById('sync-weather').innerText = "29°C Heavy Humid";
                        document.getElementById('sync-rain').innerText = "60% Probability";
                    }
                );
            }
        }

        function renderDashboard(zoneFilter = 'all') {
            activeFilter = zoneFilter;
            const container = document.getElementById('dashboardContent');
            container.innerHTML = '';

            const mapSection = document.getElementById('mapSection');
            
            if (zoneFilter === 'all') {
                mapSection.style.display = 'flex';
                return; 
            } else {
                mapSection.style.display = 'none';
            }

            const filteredData = masterDatabase.filter(item => item.zone === zoneFilter);

            filteredData.forEach(data => {
                const block = document.createElement('div');
                block.className = 'state-block';

                const newsHTML = data.news.map(n => `
                    <div class="news-item">
                        <div class="news-top-meta">
                            <span style="color: var(--intensity-high)">${n.tag}</span>
                            <span style="color: var(--text-muted)">• 60s read</span>
                        </div>
                        <div class="headline">${n.title}</div>
                        <div class="reasoning">${n.reason}</div>
                        <a href="#" class="src-btn" target="_blank">View Original Source ↗</a>
                    </div>
                `).join('');

                block.innerHTML = `
                    <div>
                        <div class="state-header">
                            <span class="state-name">${data.state}</span>
                            <span class="refresh-status">updated ${data.lastUpdatedHoursAgo}h ago</span>
                        </div>
                        <div class="news-list">${newsHTML}</div>
                    </div>
                    <div class="indicators-panel">
                        <div>
                            <div class="panel-sec-title">Commodity Index</div>
                            <div class="metric-row"><span>Grocery Basket:</span><span class="metric-val">${data.prices.grocery}</span></div>
                            <div class="metric-row"><span>Fuel (Petrol):</span><span class="metric-val">${data.prices.fuel}</span></div>
                            <div class="metric-row"><span>LPG Asset:</span><span class="metric-val">${data.prices.resource}</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(block);
            });
        }

        function switchZone(zone, buttonElement) {
            document.querySelectorAll('.zone-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.home-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.map-region').forEach(reg => reg.classList.remove('active-region'));
            
            if (buttonElement) buttonElement.classList.add('active');
            else {
                const targetBtn = (zone === 'all') ? document.getElementById('btn-all') : document.getElementById(`btn-${zone}`);
                if (targetBtn) targetBtn.classList.add('active');
            }

            if (zone !== 'all') {
                const activeMapPart = document.getElementById(`map-${zone}`);
                if (activeMapPart) activeMapPart.classList.add('active-region');
            }

            renderDashboard(zone);
        }

        function handleMapClick(zone) {
            switchZone(zone, null);
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('modeToggle');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.innerHTML = isDark ? '🌙' : '☀️';
        }

        // Accessible font slider scaling engine
        function adjustFont(amount) {
            currentFontScale = Math.max(0.8, Math.min(1.6, currentFontScale + amount));
            document.documentElement.style.setProperty('--font-scale', currentFontScale);
            renderDashboard(activeFilter);
        }

        function refreshPage() {
            window.location.reload();
        }

        document.body.setAttribute('data-theme', 'light');
        initializeSensors();
        renderDashboard('all');
    </script>
</body>
</html>
