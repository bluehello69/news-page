            --text-muted: #475569;
            --border: #0f172a;
            --accent-saffron: #ff6600;
            --accent-green: #009933;
            --accent-blue: #000088;
            --map-fill: #f8fafc;
            --map-stroke: #0f172a;
            --intensity-high: #dc2626;
            --intensity-med: #df8600;
            --intensity-low: #15803d;
            --font-scale: 1;
        }

        [data-theme="dark"] {
            --bg-main: linear-gradient(180deg, #4a1a00 0%, #020617 35%, #020617 65%, #00330f 100%);
            --bg-card: #0f172a;
            --text-primary: #ffffff;
            --text-secondary: #f1f5f9;
            --text-muted: #cbd5e1;
            --border: #64748b;
            --map-fill: #1e293b;
            --map-stroke: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--bg-main);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
        }

        header {
            display: flex;
            flex-direction: column;
            border-bottom: 5px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 28px;
            gap: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        header h1 {
            font-size: calc(2.2rem * var(--font-scale));
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            background: linear-gradient(90deg, var(--accent-saffron) 0%, var(--accent-blue) 50%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .live-sync-bar {
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            font-size: calc(1rem * var(--font-scale));
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .digital-clock {
            font-family: monospace;
            background: var(--accent-blue);
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 900;
            font-size: calc(1.1rem * var(--font-scale));
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 3px solid var(--border);
            font-size: calc(0.95rem * var(--font-scale));
            height: 44px;
            padding: 0 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            color: var(--text-primary);
        }

        .action-btn:hover {
            background: rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        .navigation-block {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .home-btn-anchor { flex: 1.2; }

        .home-btn {
            width: 100%;
            background: var(--text-primary);
            color: var(--bg-card);
            border: 4px solid var(--accent-saffron);
            padding: 16px;
            font-weight: 900;
            font-size: calc(1.1rem * var(--font-scale));
            cursor: pointer;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 12px rgba(255,102,0,0.2);
        }

        .home-btn.active { border-color: var(--accent-green); }

        .directions-subgrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            flex: 3;
        }

        .zone-btn {
            background: var(--bg-card);
            border: 3px solid var(--border);
            color: var(--text-primary);
            padding: 16px 4px;
            font-weight: 800;
            font-size: calc(0.95rem * var(--font-scale));
            cursor: pointer;
            border-radius: 12px;
            text-transform: uppercase;
            text-align: center;
        }

        .zone-btn.active {
            background: var(--accent-green);
            color: #ffffff;
            border-color: var(--accent-green);
        }

        .map-section {
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .map-container {
            width: 100%;
            max-width: 440px;
            height: auto;
        }

        .map-region {
            fill: var(--map-fill);
            stroke: var(--map-stroke);
            stroke-width: 3;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .map-region:hover {
            fill: rgba(255, 102, 0, 0.15);
            stroke: var(--accent-saffron);
        }

        .map-region.active-region {
            fill: var(--accent-green);
            stroke: #ffffff;
        }

        .map-label {
            fill: var(--text-primary);
            font-size: 14px;
            font-weight: 900;
            pointer-events: none;
            text-anchor: middle;
        }

        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .state-block {
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
            animation: fadeIn 0.4s ease;
        }

        .state-header {
            border-bottom: 3px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;

            font-size: calc(1.75rem * var(--font-scale));
            font-weight: 900;
        }

        .refresh-status {
            font-size: calc(1rem * var(--font-scale));
            color: var(--text-muted);
            font-weight: 800;
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .news-item {
            position: relative;
            padding-left: 24px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 16px;
        }
        .news-item:last-child { border: none; padding-bottom: 0; }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 8px;
            height: 20px;
            border-radius: 4px;
            background: var(--i-marker);
        }

        .news-top-meta {
            font-size: calc(0.85rem * var(--font-scale));
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .headline {
            font-size: calc(1.25rem * var(--font-scale));
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .reasoning {

            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 8px;
        }

            color: var(--accent-blue);
            text-decoration: underline;
            font-weight: 700;
        }

            .navigation-block { flex-direction: column; gap: 8px; }
            .directions-subgrid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        let currentFontScale = 1.0;
        let activeFilter = 'all';

        function initializeSensors() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
            }, 1000);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude.toFixed(2);
                        const lon = position.coords.longitude.toFixed(2);
                        document.getElementById('sync-city').innerText = `Lat: ${lat}, Lon: ${lon}`;
                        const mockTemp = Math.floor(26 + (position.coords.latitude % 8));
                        document.getElementById('sync-weather').innerText = `${mockTemp}°C Modulate Overcast`;
                        document.getElementById('sync-rain').innerText = mockTemp > 31 ? "12% Trace Risk" : "70% Active Showers Tracked";
                    },
                    () => {
                        document.getElementById('sync-city').innerText = "Kolkata, WB";
                        document.getElementById('sync-weather').innerText = "29°C Heavy Humid";
                        document.getElementById('sync-rain').innerText = "60% Probability";
                    }
                );
            }
        }

        function renderDashboard(zoneFilter = 'all') {
            activeFilter = zoneFilter;
            const container = document.getElementById('dashboardContent');
            container.innerHTML = '';

            const mapSection = document.getElementById('mapSection');
            
            if (zoneFilter === 'all') {
                mapSection.style.display = 'flex';
                return; 
            } else {
                mapSection.style.display = 'none';
            }

            const filteredData = masterDatabase.filter(item => item.zone === zoneFilter);

            filteredData.forEach(data => {
                const block = document.createElement('div');
                block.className = 'state-block';

                const newsHTML = data.news.map(n => {
                    let markerColor = 'var(--intensity-low)';
                    if(n.intensity === 'high') markerColor = 'var(--intensity-high)';
                    if(n.intensity === 'med') markerColor = 'var(--intensity-med)';

                    return `
                        <div class="news-item" style="--i-marker: ${markerColor}">
                            <div class="news-top-meta" style="color: ${markerColor}">${n.tag}</div>
                            <div class="headline">${n.title}</div>
                            <div class="reasoning">${n.reason}</div>
                            <a href="#" class="src-btn" target="_blank">View Original Source ↗</a>
                        </div>
                    `;
                }).join('');

                block.innerHTML = `
                    <div class="state-header">
                        <span class="state-name">${data.state.replace('_', ' ')}</span>
                        <span class="refresh-status">Refreshed at ${data.logHour} IST</span>
                    </div>
                    <div class="news-list">${newsHTML}</div>
                `;
                container.appendChild(block);
            });
        }

        function switchZone(zone, buttonElement) {
            document.querySelectorAll('.zone-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.home-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.map-region').forEach(reg => reg.classList.remove('active-region'));
            
            if (buttonElement) buttonElement.classList.add('active');
            else {
                const targetBtn = (zone === 'all') ? document.getElementById('btn-all') : document.getElementById(`btn-${zone}`);
                if (targetBtn) targetBtn.classList.add('active');
            }

            if (zone !== 'all') {
                const activeMapPart = document.getElementById(`map-${zone}`);
                if (activeMapPart) activeMapPart.classList.add('active-region');
            }

            renderDashboard(zone);
        }

        function handleMapClick(zone) {
            switchZone(zone, null);
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('modeToggle');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.innerHTML = isDark ? '🌙' : '☀️';
        }

        function adjustFont(amount) {
            currentFontScale = Math.max(0.8, Math.min(1.6, currentFontScale + amount));
            document.documentElement.style.setProperty('--font-scale', currentFontScale);
            renderDashboard(activeFilter);
        }

        function refreshPage() {
            window.location.reload();
        }

        document.body.setAttribute('data-theme', 'light');
        initializeSensors();
        renderDashboard('all');
