            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-dark: #111424;
            --flag-saffron: #ff671f;
            --flag-green: #046a38;
            --flag-blue: #06038d;
            
            --intensity-high: #dc2626;
            --intensity-med: #d97706;
            --intensity-low: #16a34a;
            --font-scale: 1;
        }

        [data-theme="dark"] {
            /* Premium, uniform low-glare pitch black theme */
            --bg-main: #000000;
            --bg-card: #0b0f19;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border: #1e293b;
            --border-dark: #f8fafc;
            --flag-saffron: #ff8038;
            --flag-green: #058249;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .wrapper {
            width: 100%;
            max-width: 1040px;
        }

        header {
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid var(--border-dark);
            padding-bottom: 24px;
            margin-bottom: 32px;
            gap: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Sophisticated, subtle premium tricolor typographic header */
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: calc(2.6rem * var(--font-scale));
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--flag-saffron) 0%, var(--flag-saffron) 35%, var(--flag-blue) 48%, var(--flag-blue) 52%, var(--flag-green) 65%, var(--flag-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        [data-theme="dark"] header h1 {
            background: linear-gradient(90deg, var(--flag-saffron) 0%, var(--flag-saffron) 35%, #ffffff 48%, #ffffff 52%, var(--flag-green) 65%, var(--flag-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cleaned metadata banner matrix */
        .live-sync-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: calc(0.85rem * var(--font-scale));
            font-weight: 600;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }

        .location-btn {
            background: transparent;
            color: var(--flag-saffron);
            border: 1px solid var(--flag-saffron);
            padding: 4px 10px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            font-size: calc(0.75rem * var(--font-scale));
            transition: all 0.2s ease;
        }
        .location-btn:hover {
            background: var(--flag-saffron);
            color: #ffffff;
        }

        .digital-clock {
            font-family: monospace;
            font-weight: 700;
            font-size: calc(1rem * var(--font-scale));
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: calc(0.85rem * var(--font-scale));
            height: 36px;
            padding: 0 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-primary);
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .action-btn:hover {
            border-color: var(--text-primary);
        }

        /* Sleek Editorial Navigation Bar */
        .navigation-block {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .home-btn-anchor { flex: 1; }

        .home-btn {
            width: 100%;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 12px;
            font-weight: 700;
            font-size: calc(0.9rem * var(--font-scale));
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .home-btn.active {
            background: var(--text-primary);
            color: var(--bg-card);
            border-color: var(--text-primary);
        }

        .directions-subgrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            flex: 4;
        }

        .zone-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 12px 4px;
            font-weight: 600;
            font-size: calc(0.9rem * var(--font-scale));
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .zone-btn.active {
            background: var(--bg-card);
            color: var(--flag-green);
            border-color: var(--flag-green);
            box-shadow: inset 0 -2px 0 var(--flag-green);
        }

        /* Minimal Map Interface Graphic Wrapper */
        .map-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }

        .map-container {
            width: 100%;
            max-width: 400px;
            height: auto;
        }

        .map-region {
            fill: var(--bg-main);
            stroke: var(--border);
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .map-region:hover {
            fill: #fff7ed;
            stroke: var(--flag-saffron);
        }
        [data-theme="dark"] .map-region:hover {
            fill: #1c140c;
        }

        .map-region.active-region {
            fill: #f0fdf4;
            stroke: var(--flag-green);
        }
        [data-theme="dark"] .map-region.active-region {
            fill: #061c10;
        }

        .map-label {
            fill: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            pointer-events: none;
            text-anchor: middle;
        }

        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* Cleaned Grid State Blocks */
        .state-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .state-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .state-name {
            font-family: 'Playfair Display', serif;
            font-size: calc(2rem * var(--font-scale));
            font-weight: 700;
            letter-spacing: -0.5px;

            color: var(--text-muted);
            font-weight: 500;
        }

        .news-list {

            flex-direction: column;
            gap: 28px;

        .news-item {
            position: relative;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);

            font-size: calc(0.75rem * var(--font-scale));
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;

        .headline {
            font-size: calc(1.3rem * var(--font-scale));
            font-weight: 700;
            line-height: 1.35;
            margin-bottom: 8px;
            letter-spacing: -0.2px;

            font-size: calc(0.95rem * var(--font-scale));
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;

            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;

            border-radius: 8px;

            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;

            font-size: calc(0.9rem * var(--font-scale));
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            font-weight: 800;
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .trend-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .trend-label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: calc(0.75rem * var(--font-scale));
            color: var(--text-muted);
            letter-spacing: 0.5px;

            font-weight: 600;
            font-size: calc(0.95rem * var(--font-scale));
            line-height: 1.45;
            color: var(--text-secondary);
        }

            .state-block { grid-template-columns: 1fr; gap: 32px; }
        }

        @media(max-width: 768px) {
            body { padding: 20px 10px; }
            .navigation-block { flex-direction: column; gap: 8px; }
            .directions-subgrid { grid-template-columns: repeat(2, 1fr); }
            .map-section { padding: 20px; }
        }

        function initializeClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
            }, 1000);
        }

        function requestLocation() {
            if (navigator.geolocation) {
                document.getElementById('location-display').innerHTML = `🌐 Location: <span>Requesting...</span>`;
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude.toFixed(2);
                        const lon = position.coords.longitude.toFixed(2);
                        document.getElementById('location-display').innerHTML = `🌐 Location: <span>Lat: ${lat}, Lon: ${lon}</span>`;
                        
                        const mockTemp = Math.floor(26 + (position.coords.latitude % 8));
                        document.getElementById('sync-weather').innerText = `${mockTemp}°C Intermittent Overcast`;
                        document.getElementById('sync-rain').innerText = mockTemp > 31 ? "12% Trace Risk" : "70% Showers Pending";
                    },
                    () => {
                        document.getElementById('location-display').innerHTML = `🌐 Location: <span>Kolkata, WB (Default)</span>`;
                        document.getElementById('sync-weather').innerText = "29°C Heavy Humid";
                        document.getElementById('sync-rain').innerText = "60% Probability";
                    }
                );
            }
        }

        function renderDashboard(zoneFilter = 'all') {
            activeFilter = zoneFilter;
            const container = document.getElementById('dashboardContent');
            container.innerHTML = '';

            const mapSection = document.getElementById('mapSection');
            
            if (zoneFilter === 'all') {
                mapSection.style.display = 'flex';
                return; 
            } else {
                mapSection.style.display = 'none';
            }

            const filteredData = masterDatabase.filter(item => item.zone === zoneFilter);

            filteredData.forEach(data => {
                const block = document.createElement('div');
                block.className = 'state-block';

                const newsHTML = data.news.map(n => {
                    let colorCode = 'var(--intensity-low)';
                    if(n.intensity === 'high') colorCode = 'var(--intensity-high)';
                    if(n.intensity === 'med') colorCode = 'var(--intensity-med)';

                    return `
                        <div class="news-item">
                            <div class="news-top-meta" style="color: ${colorCode}">${n.tag}</div>
                            <div class="headline">${n.title}</div>
                            <div class="reasoning">${n.reason}</div>
                            <a href="#" class="src-btn" target="_blank">View Source ↗</a>
                        </div>
                    `;
                }).join('');

                block.innerHTML = `
                    <div>
                        <div class="state-header">
                            <span class="state-name">${data.state}</span>
                            <span class="refresh-status">Refreshed at ${data.logHour} IST</span>
                        </div>
                        <div class="news-list">${newsHTML}</div>
                    </div>
                    
                    <div class="trends-panel">
                        <div class="trend-title">Trending in State</div>
                        <div class="trend-row">
                            <span class="trend-label">🌟 Buzz in the City</span>
                            <span class="trend-val">${data.trends.buzz}</span>
                        </div>
                        <div class="trend-row">
                            <span class="trend-label">🗣️ Talk of the Town</span>
                            <span class="trend-val">${data.trends.talk}</span>
                        </div>
                        <div class="trend-row">
                            <span class="trend-label">🎖️ State Featured</span>
                            <span class="trend-val">${data.trends.featured}</span>
                        </div>
                        <div class="trend-row">
                            <span class="trend-label">🏆 Top Scoop in Sports</span>
                            <span class="trend-val">${data.trends.sports}</span>
                        </div>
                        <div class="trend-row">
                            <span class="trend-label">💻 Trending Tech</span>
                            <span class="trend-val">${data.trends.tech}</span>

        function switchZone(zone, buttonElement) {
            document.querySelectorAll('.zone-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.home-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.map-region').forEach(reg => reg.classList.remove('active-region'));
            
            if (buttonElement) buttonElement.classList.add('active');
            else {
                const targetBtn = (zone === 'all') ? document.getElementById('btn-all') : document.getElementById(`btn-${zone}`);
                if (targetBtn) targetBtn.classList.add('active');
            }

            if (zone !== 'all') {
                const activeMapPart = document.getElementById(`map-${zone}`);
                if (activeMapPart) activeMapPart.classList.add('active-region');
            }

            renderDashboard(zone);
        }

        function handleMapClick(zone) {
            switchZone(zone, null);
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('modeToggle');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.innerHTML = isDark ? '🌙' : '☀️';
        }

        function adjustFont(amount) {
            currentFontScale = Math.max(0.8, Math.min(1.4, currentFontScale + amount));
            document.documentElement.style.setProperty('--font-scale', currentFontScale);
            renderDashboard(activeFilter);
        }

        function refreshPage() {
            window.location.reload();
        }

        document.body.setAttribute('data-theme', 'light');
        initializeClock();
        renderDashboard('all');
